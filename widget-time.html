<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Time</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,700;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: transparent;
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      display: flex;
      align-items: center;
      gap: 36px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ── Big day ring ── */
    .ring-wrap {
      position: relative;
      width: 220px;
      height: 220px;
      flex-shrink: 0;
    }

    .ring-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-track {
      fill: none;
      stroke: rgba(0, 0, 0, 0.06);
      stroke-width: 4;
    }

    .ring-fill {
      fill: none;
      stroke: #0f0f0f;
      stroke-width: 4;
      stroke-linecap: round;
      transition: stroke-dasharray 1.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .ring-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .ring-label {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 13px;
      color: #888;
      letter-spacing: 0.02em;
      margin-bottom: -2px;
    }

    .ring-num {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-size: 80px;
      line-height: 1;
      letter-spacing: -3px;
      color: #0f0f0f;
      font-variant-numeric: tabular-nums;
    }

    .ring-sub {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: #888;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
    }

    /* ── Side panel ── */
    .side {
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-width: 180px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-label {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      color: #999;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .stat-value {
      font-family: 'Fraunces', serif;
      font-size: 32px;
      font-weight: 400;
      letter-spacing: -1px;
      color: #0f0f0f;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .stat-value .total {
      color: #b0b0b0;
      font-size: 18px;
      letter-spacing: -0.3px;
    }

    .divider {
      height: 1px;
      background: rgba(0, 0, 0, 0.06);
      width: 100%;
    }

    .date-line {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 14px;
      color: #444;
      letter-spacing: -0.2px;
      line-height: 1.3;
    }

    /* ── Dark mode ── */
    @media (prefers-color-scheme: dark) {
      body { color: #f5f5f5; }
      .ring-track { stroke: rgba(255, 255, 255, 0.08); }
      .ring-fill { stroke: #f5f5f5; }
      .ring-num { color: #f5f5f5; }
      .ring-label, .ring-sub { color: #888; }
      .stat-label { color: #777; }
      .stat-value { color: #f5f5f5; }
      .stat-value .total { color: #555; }
      .divider { background: rgba(255, 255, 255, 0.08); }
      .date-line { color: #aaa; }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Big circular ring with day number -->
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 100 100">
        <circle class="ring-track" cx="50" cy="50" r="46"/>
        <circle class="ring-fill"  cx="50" cy="50" r="46"
                stroke-dasharray="0 289" id="ringFill"/>
      </svg>
      <div class="ring-content">
        <span class="ring-label">Day</span>
        <span class="ring-num" id="dayNum">—</span>
        <span class="ring-sub" id="daySub">— / —</span>
      </div>
    </div>

    <!-- Side stats -->
    <div class="side">
      <div class="stat">
        <span class="stat-label">Week</span>
        <span class="stat-value"><span id="weekNum">—</span><span class="total"> / <span id="weekTotal">52</span></span></span>
      </div>

      <div class="divider"></div>

      <div class="stat">
        <span class="stat-label">Year Progress</span>
        <span class="stat-value" id="pctValue">—%</span>
      </div>

      <div class="divider"></div>

      <div class="date-line" id="dateLine">—</div>
    </div>

  </div>

  <script>
    function getISOWeek(d) {
      const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      const day = date.getUTCDay() || 7;
      date.setUTCDate(date.getUTCDate() + 4 - day);
      const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
      return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
    }

    function getWeeksInYear(year) {
      return getISOWeek(new Date(year, 11, 28));
    }

    function isLeapYear(y) {
      return (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0;
    }

    function update() {
      const now = new Date();
      const year = now.getFullYear();

      // Day of year
      const start = new Date(year, 0, 0);
      const dayOfYear = Math.floor((now - start) / 86400000);
      const totalDays = isLeapYear(year) ? 366 : 365;
      const pct = (dayOfYear / totalDays) * 100;

      // Week
      const week = getISOWeek(now);
      const totalWeeks = getWeeksInYear(year);

      document.getElementById('dayNum').textContent = dayOfYear;
      document.getElementById('daySub').textContent = `of ${totalDays}`;
      document.getElementById('weekNum').textContent = week;
      document.getElementById('weekTotal').textContent = totalWeeks;
      document.getElementById('pctValue').textContent = pct.toFixed(1) + '%';

      // Ring progress (circumference ≈ 289 for r=46)
      const circumference = 2 * Math.PI * 46;
      const dashFill = (pct / 100) * circumference;
      setTimeout(() => {
        document.getElementById('ringFill').setAttribute(
          'stroke-dasharray',
          `${dashFill} ${circumference}`
        );
      }, 100);

      // Date line
      const opts = { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' };
      document.getElementById('dateLine').textContent = now.toLocaleDateString('en-US', opts);
    }

    update();
    setInterval(update, 60000);
  </script>

</body>
</html>
