<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Breathwork</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: transparent;
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      user-select: none;
      -webkit-user-select: none;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 380px;
    }

    /* ── Frequency selector ── */
    .freq-row {
      display: flex;
      gap: 4px;
      width: 100%;
      background: rgba(0, 0, 0, 0.04);
      border-radius: 100px;
      padding: 4px;
    }

    .freq-btn {
      flex: 1;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 9px 0;
      border-radius: 100px;
      border: none;
      background: transparent;
      color: #666;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .freq-btn:hover { color: #0f0f0f; }
    .freq-btn.active {
      background: #0f0f0f;
      color: #fff;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }

    /* ── Breathing area ── */
    .breath-area {
      position: relative;
      width: 240px;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .breath-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(140, 190, 230, 0.32), rgba(80, 140, 200, 0.08));
      border: 1px solid rgba(80, 140, 200, 0.2);
      transition: transform 5s cubic-bezier(0.4, 0, 0.6, 1);
      position: absolute;
      transform: scale(1);
    }

    .breath-circle.inhale  { transform: scale(2.0); transition-duration: 5s; }
    .breath-circle.hold    { transform: scale(2.0); transition-duration: 2s; }
    .breath-circle.exhale  { transform: scale(1.0); transition-duration: 5s; }

    .breath-text {
      position: relative;
      z-index: 2;
      text-align: center;
      pointer-events: none;
    }

    .phase {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 30px;
      font-weight: 400;
      color: #0f0f0f;
      letter-spacing: -0.5px;
    }

    .intention {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      color: #888;
      margin-top: 6px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button.main {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 500;
      padding: 12px 32px;
      border-radius: 100px;
      border: 1px solid #0f0f0f;
      background: #0f0f0f;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button.main.stop {
      background: transparent;
      color: #0f0f0f;
    }

    button.main:hover { transform: translateY(-1px); }

    button.icon {
      width: 36px;
      height: 36px;
      padding: 0;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.1);
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      color: #666;
    }

    button.icon:hover {
      border-color: rgba(0, 0, 0, 0.25);
      color: #0f0f0f;
    }

    button.icon.active {
      background: #0f0f0f;
      color: #fff;
      border-color: #0f0f0f;
    }

    /* Hide YouTube iframe */
    #ytPlayer {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      top: -9999px;
      left: -9999px;
    }

    /* ── Dark mode ── */
    @media (prefers-color-scheme: dark) {
      body { color: #f5f5f5; }
      .phase { color: #f5f5f5; }
      .intention { color: #888; }
      .freq-row { background: rgba(255,255,255,0.06); }
      .freq-btn { color: #999; }
      .freq-btn:hover { color: #f5f5f5; }
      .freq-btn.active {
        background: #f5f5f5;
        color: #0f0f0f;
      }
      button.main {
        background: #f5f5f5;
        color: #0f0f0f;
        border-color: #f5f5f5;
      }
      button.main.stop {
        background: transparent;
        color: #f5f5f5;
      }
      button.icon {
        border-color: rgba(255,255,255,0.12);
        color: #999;
      }
      button.icon:hover {
        border-color: rgba(255,255,255,0.3);
        color: #f5f5f5;
      }
      button.icon.active {
        background: #f5f5f5;
        color: #0f0f0f;
        border-color: #f5f5f5;
      }
      .breath-circle {
        background: radial-gradient(circle at 30% 30%, rgba(140, 200, 240, 0.28), rgba(80, 140, 200, 0.06));
        border-color: rgba(140, 200, 240, 0.18);
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Frequency selector -->
    <div class="freq-row" id="freqRow">
      <button class="freq-btn active" data-freq="528">528</button>
      <button class="freq-btn" data-freq="432">432</button>
      <button class="freq-btn" data-freq="888">888</button>
      <button class="freq-btn" data-freq="963">963</button>
    </div>

    <!-- Breathing circle -->
    <div class="breath-area">
      <div class="breath-circle" id="circle"></div>
      <div class="breath-text">
        <div class="phase" id="phase">Begin</div>
        <div class="intention" id="intention">Manifestation</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="main" id="startBtn">Start</button>
      <button class="icon active" id="musicBtn" title="Toggle music">♪</button>
      <button class="icon" id="voiceBtn" title="Toggle voice cues">🗣</button>
    </div>

  </div>

  <!-- Hidden YouTube player -->
  <div id="ytPlayer"></div>

  <script>
    // ─── Frequency → YouTube video map ──────────────────────────────────────
    const FREQ_DATA = {
      528: {
        videoId:   '1QbFmVWYhK4',  // 528 Hz Frequency of Love
        intention: 'Manifestation'
      },
      432: {
        videoId:   '4kNqeJACi9U',  // 432+528 Hz Manifest Miracles
        intention: 'Cosmic Alignment'
      },
      888: {
        videoId:   'ptlO6UlpM2U',  // 888 Hz Abundance & Prosperity
        intention: 'Abundance'
      },
      963: {
        videoId:   'KYDeJ48aQDA',  // 963 Hz Crown Chakra
        intention: 'Higher State'
      }
    };

    // ─── Breathing pattern: 5-2-5 (heart coherence) ────────────────────────
    const PHASES = [
      { name: 'Inhale', duration: 5, scale: 'inhale' },
      { name: 'Hold',   duration: 2, scale: 'hold'   },
      { name: 'Exhale', duration: 5, scale: 'exhale' },
    ];

    const circle      = document.getElementById('circle');
    const phaseEl     = document.getElementById('phase');
    const intentionEl = document.getElementById('intention');
    const startBtn    = document.getElementById('startBtn');
    const musicBtn    = document.getElementById('musicBtn');
    const voiceBtn    = document.getElementById('voiceBtn');
    const freqRow     = document.getElementById('freqRow');

    let running = false;
    let musicOn = true;
    let voiceOn = true;  // Voice ON by default
    let timer   = null;
    let phaseIdx = 0;
    let currentFreq = 528;
    let ytPlayer = null;
    let ytReady  = false;

    voiceBtn.classList.add('active'); // reflect default voice state

    // ─── YouTube IFrame API setup ──────────────────────────────────────────
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = function () {
      ytPlayer = new YT.Player('ytPlayer', {
        height: '1',
        width: '1',
        videoId: FREQ_DATA[currentFreq].videoId,
        playerVars: {
          autoplay:    0,
          loop:        1,
          playlist:    FREQ_DATA[currentFreq].videoId,
          controls:    0,
          modestbranding: 1,
          rel:         0,
          fs:          0,
          playsinline: 1
        },
        events: {
          'onReady': () => { ytReady = true; }
        }
      });
    };

    function loadFrequency(hz) {
      currentFreq = hz;
      intentionEl.textContent = FREQ_DATA[hz].intention;
      if (ytReady && ytPlayer) {
        ytPlayer.loadVideoById({
          videoId:    FREQ_DATA[hz].videoId,
          startSeconds: 0
        });
        if (running && musicOn) {
          ytPlayer.playVideo();
        } else if (!musicOn) {
          ytPlayer.pauseVideo();
        }
      }
    }

    function speakPhase(name) {
      if (!voiceOn || !('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(name);
      u.rate   = 0.8;
      u.pitch  = 0.85;
      u.volume = 0.6;
      window.speechSynthesis.speak(u);
    }

    function runPhase() {
      if (!running) return;
      const p = PHASES[phaseIdx];

      circle.className = 'breath-circle ' + p.scale;
      phaseEl.textContent = p.name;
      speakPhase(p.name);

      timer = setTimeout(() => {
        phaseIdx = (phaseIdx + 1) % PHASES.length;
        runPhase();
      }, p.duration * 1000);
    }

    function start() {
      running = true;
      phaseIdx = 0;
      startBtn.textContent = 'Stop';
      startBtn.classList.add('stop');
      if (musicOn && ytReady && ytPlayer) {
        ytPlayer.setVolume(70);
        ytPlayer.playVideo();
      }
      runPhase();
    }

    function stop() {
      running = false;
      clearTimeout(timer);
      circle.className = 'breath-circle';
      phaseEl.textContent = 'Begin';
      startBtn.textContent = 'Start';
      startBtn.classList.remove('stop');
      if (ytReady && ytPlayer) ytPlayer.pauseVideo();
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    }

    startBtn.addEventListener('click', () => running ? stop() : start());

    musicBtn.addEventListener('click', () => {
      musicOn = !musicOn;
      musicBtn.classList.toggle('active', musicOn);
      if (ytReady && ytPlayer) {
        if (musicOn && running) ytPlayer.playVideo();
        else                    ytPlayer.pauseVideo();
      }
    });

    voiceBtn.addEventListener('click', () => {
      voiceOn = !voiceOn;
      voiceBtn.classList.toggle('active', voiceOn);
      if (!voiceOn && 'speechSynthesis' in window) window.speechSynthesis.cancel();
    });

    freqRow.querySelectorAll('.freq-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        freqRow.querySelectorAll('.freq-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadFrequency(parseInt(btn.dataset.freq));
      });
    });
  </script>

</body>
</html>
