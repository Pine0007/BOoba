<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Breathwork</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: transparent; height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      user-select: none;
      -webkit-user-select: none;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      width: 100%;
      max-width: 360px;
    }

    /* ── Mode selector ── */
    .mode-row {
      display: flex;
      gap: 4px;
      width: 100%;
      background: rgba(180, 140, 60, 0.07);
      border-radius: 100px;
      padding: 4px;
      border: 1px solid rgba(180, 140, 60, 0.14);
    }

    .mode-btn {
      flex: 1;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.07em;
      padding: 8px 0;
      border-radius: 100px;
      border: none;
      background: transparent;
      color: rgba(130, 95, 25, 0.5);
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
    }

    .mode-btn:hover { color: rgba(150, 110, 30, 0.85); }

    .mode-btn.active {
      background: linear-gradient(135deg, #c9a84c, #e0bf62);
      color: #fff;
      box-shadow: 0 2px 10px rgba(195, 155, 55, 0.3);
    }

    /* ── Breathing area ── */
    .breath-area {
      position: relative;
      width: 260px;
      height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Outer rotating ring */
    .glow-ring {
      position: absolute;
      width: 205px;
      height: 205px;
      border-radius: 50%;
      border: 1px solid rgba(200, 165, 75, 0.14);
      animation: rotateRing 24s linear infinite;
      pointer-events: none;
    }

    @keyframes rotateRing {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Main breath orb */
    .breath-circle {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      position: absolute;
      transition: transform 5s cubic-bezier(0.4, 0, 0.6, 1),
                  box-shadow 5s cubic-bezier(0.4, 0, 0.6, 1),
                  background 2s ease;
      transform: scale(1);
      background: radial-gradient(circle at 35% 35%,
        rgba(255, 218, 110, 0.50),
        rgba(198, 155, 55, 0.22),
        rgba(155, 105, 22, 0.07));
      box-shadow:
        0 0 18px rgba(215, 172, 68, 0.18),
        0 0 52px rgba(215, 172, 68, 0.05),
        inset 0 0 18px rgba(255, 228, 130, 0.13);
      border: 1px solid rgba(215, 175, 72, 0.28);
    }

    .breath-circle.inhale {
      transform: scale(2.1);
      background: radial-gradient(circle at 35% 35%,
        rgba(255, 232, 142, 0.62),
        rgba(218, 172, 65, 0.32),
        rgba(175, 125, 35, 0.11));
      box-shadow:
        0 0 38px rgba(228, 185, 82, 0.38),
        0 0 95px rgba(228, 185, 82, 0.10),
        inset 0 0 28px rgba(255, 238, 155, 0.18);
      transition-duration: 5s;
    }

    .breath-circle.hold {
      transform: scale(2.1);
      background: radial-gradient(circle at 35% 35%,
        rgba(255, 240, 162, 0.68),
        rgba(222, 178, 72, 0.38),
        rgba(180, 132, 42, 0.14));
      box-shadow:
        0 0 50px rgba(232, 192, 90, 0.48),
        0 0 115px rgba(232, 192, 90, 0.13),
        inset 0 0 38px rgba(255, 245, 175, 0.22);
      transition-duration: 2s;
    }

    .breath-circle.exhale {
      transform: scale(1);
      background: radial-gradient(circle at 35% 35%,
        rgba(255, 215, 105, 0.42),
        rgba(195, 152, 50, 0.18),
        rgba(150, 100, 20, 0.05));
      box-shadow:
        0 0 12px rgba(210, 168, 62, 0.12),
        0 0 35px rgba(210, 168, 62, 0.03),
        inset 0 0 12px rgba(255, 220, 120, 0.08);
      transition-duration: 5s;
    }

    /* Text */
    .breath-text {
      position: relative;
      z-index: 2;
      text-align: center;
      pointer-events: none;
    }

    .phase {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 27px;
      font-weight: 300;
      letter-spacing: 0.02em;
      color: #7a5818;
    }

    .sublabel {
      font-size: 9px;
      color: rgba(135, 98, 28, 0.52);
      margin-top: 5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 400;
    }

    /* headphones notice */
    .headphones {
      font-size: 9px;
      color: rgba(135, 98, 28, 0.38);
      letter-spacing: 0.10em;
      text-transform: uppercase;
      text-align: center;
      font-weight: 400;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button.main {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-style: italic;
      font-weight: 400;
      letter-spacing: 0.12em;
      padding: 11px 34px;
      border-radius: 100px;
      border: 1px solid rgba(185, 142, 50, 0.45);
      background: linear-gradient(135deg, rgba(195, 155, 55, 0.10), rgba(218, 175, 72, 0.05));
      color: #7a5818;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button.main:hover {
      background: linear-gradient(135deg, rgba(195, 155, 55, 0.18), rgba(218, 175, 72, 0.10));
      box-shadow: 0 0 18px rgba(195, 155, 55, 0.13);
    }

    button.main.stop {
      background: transparent;
      color: rgba(135, 98, 28, 0.42);
      border-color: rgba(185, 142, 50, 0.22);
    }

    button.icon {
      width: 34px;
      height: 34px;
      padding: 0;
      border-radius: 50%;
      border: 1px solid rgba(185, 142, 50, 0.22);
      background: transparent;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      color: rgba(135, 98, 28, 0.45);
    }

    button.icon:hover { border-color: rgba(185, 142, 50, 0.48); color: #7a5818; }

    button.icon.active {
      background: linear-gradient(135deg, rgba(195, 155, 55, 0.18), rgba(218, 175, 72, 0.08));
      border-color: rgba(185, 142, 50, 0.48);
      color: #7a5818;
    }

    @media (prefers-color-scheme: dark) {
      .phase { color: #d4aa55; }
      .sublabel { color: rgba(200, 162, 72, 0.48); }
      .headphones { color: rgba(200, 162, 72, 0.32); }
      .mode-btn { color: rgba(200, 162, 72, 0.42); }
      .mode-btn:hover { color: rgba(200, 162, 72, 0.78); }
      button.main { color: #d4aa55; border-color: rgba(200, 162, 72, 0.38); }
      button.main.stop { color: rgba(200, 162, 72, 0.35); }
      button.icon { color: rgba(200, 162, 72, 0.38); border-color: rgba(200, 162, 72, 0.18); }
      button.icon:hover { color: #d4aa55; border-color: rgba(200, 162, 72, 0.5); }
      button.icon.active { color: #d4aa55; border-color: rgba(200, 162, 72, 0.5); }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Mode selector: Theta visualization vs Solfeggio -->
    <div class="mode-row" id="modeRow">
      <button class="mode-btn active" data-mode="theta">Theta 6Hz</button>
      <button class="mode-btn" data-mode="528">528 Hz</button>
      <button class="mode-btn" data-mode="432">432 Hz</button>
      <button class="mode-btn" data-mode="963">963 Hz</button>
    </div>

    <!-- Breathing circle -->
    <div class="breath-area">
      <div class="glow-ring"></div>
      <div class="breath-circle" id="circle"></div>
      <div class="breath-text">
        <div class="phase" id="phase">Begin</div>
        <div class="sublabel" id="sublabel">Visualization</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="main" id="startBtn">Begin</button>
      <button class="icon active" id="soundBtn">♪</button>
      <button class="icon active" id="chimeBtn">✦</button>
    </div>

    <div class="headphones" id="headphonesNote">🎧 use headphones for full effect</div>

  </div>

  <script>
    // ─── Mode definitions ─────────────────────────────────────────────────
    // Theta: true binaural beat — left ear 250Hz, right ear 256Hz = 6Hz beat
    // Solfeggio: pure carrier drone at the frequency
    const MODES = {
      theta: {
        leftHz:    250,
        rightHz:   256,   // 256-250 = 6Hz theta beat — visualization/flow state
        sublabel:  'Visualization · Flow State',
        chimeNote: 250
      },
      528: {
        leftHz:    528,
        rightHz:   534,   // 6Hz beat on 528 carrier
        sublabel:  'I Am Love · Manifestation',
        chimeNote: 264
      },
      432: {
        leftHz:    432,
        rightHz:   438,   // 6Hz beat on 432 carrier
        sublabel:  'I Am Aligned · Cosmic',
        chimeNote: 216
      },
      963: {
        leftHz:    963,
        rightHz:   969,   // 6Hz beat on 963 carrier
        sublabel:  'I Am Infinite · Crown',
        chimeNote: 321
      }
    };

    // 4-7-8 pattern: inhale to receive, long hold to visualize vividly, exhale to release resistance
    const PHASES = [
      { name: 'Receive',   duration: 4, scale: 'inhale' },
      { name: 'Visualize', duration: 7, scale: 'hold'   },
      { name: 'Release',   duration: 8, scale: 'exhale' },
    ];

    const circle    = document.getElementById('circle');
    const phaseEl   = document.getElementById('phase');
    const sublabelEl = document.getElementById('sublabel');
    const startBtn  = document.getElementById('startBtn');
    const soundBtn  = document.getElementById('soundBtn');
    const chimeBtn  = document.getElementById('chimeBtn');
    const modeRow   = document.getElementById('modeRow');

    let running   = false;
    let soundOn   = true;
    let chimesOn  = true;
    let timer     = null;
    let phaseIdx  = 0;
    let currentMode = 'theta';
    let ctx = null;
    let droneNodes = null;

    function getCtx() {
      if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (ctx.state === 'suspended') ctx.resume();
      return ctx;
    }

    // ─── Reverb ───────────────────────────────────────────────────────────
    function makeReverb(c, duration = 5.0, decay = 3.5) {
      const rate = c.sampleRate;
      const len  = rate * duration;
      const buf  = c.createBuffer(2, len, rate);
      for (let ch = 0; ch < 2; ch++) {
        const d = buf.getChannelData(ch);
        for (let i = 0; i < len; i++) {
          d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
        }
      }
      const node = c.createConvolver();
      node.buffer = buf;
      return node;
    }

    // ─── True binaural beat drone ─────────────────────────────────────────
    // Left and right channels carry different frequencies
    // Brain perceives the DIFFERENCE as a low-frequency beat (theta = 6Hz)
    // This is the scientifically validated mechanism — NOT just two tones
    function startDrone(mode) {
      stopDrone();
      if (!soundOn) return;
      const c   = getCtx();
      const now = c.currentTime;
      const m   = MODES[mode];

      // Create stereo channel merger — critical for true binaural effect
      const merger  = c.createChannelMerger(2);
      const reverb  = makeReverb(c, 5.0, 3.5);
      const master  = c.createGain();

      merger.connect(reverb);
      reverb.connect(master);
      master.connect(c.destination);

      master.gain.setValueAtTime(0, now);
      master.gain.linearRampToValueAtTime(0.30, now + 6.0); // very slow golden fade

      // ── LEFT EAR ──────────────────────────────────────────────────────
      const oscL   = c.createOscillator();
      const gainL  = c.createGain();
      const splitterL = c.createChannelSplitter(1);
      oscL.type = 'sine';
      oscL.frequency.setValueAtTime(m.leftHz, now);
      gainL.gain.setValueAtTime(0, now);
      gainL.gain.linearRampToValueAtTime(0.5, now + 6.0);
      oscL.connect(gainL);
      gainL.connect(merger, 0, 0); // left channel only

      // ── RIGHT EAR ─────────────────────────────────────────────────────
      const oscR  = c.createOscillator();
      const gainR = c.createGain();
      oscR.type = 'sine';
      oscR.frequency.setValueAtTime(m.rightHz, now);
      gainR.gain.setValueAtTime(0, now);
      gainR.gain.linearRampToValueAtTime(0.5, now + 6.0);
      oscR.connect(gainR);
      gainR.connect(merger, 0, 1); // right channel only

      // ── Sub-harmonic warmth (mono, both ears) ─────────────────────────
      // Adds gentle body resonance without disturbing the binaural beat
      const oscSub  = c.createOscillator();
      const gainSub = c.createGain();
      const lpfSub  = c.createBiquadFilter();
      lpfSub.type = 'lowpass';
      lpfSub.frequency.value = 300;
      lpfSub.Q.value = 0.4;
      oscSub.type = 'sine';
      oscSub.frequency.value = m.leftHz * 0.5;
      gainSub.gain.setValueAtTime(0, now);
      gainSub.gain.linearRampToValueAtTime(0.08, now + 6.0);
      oscSub.connect(gainSub);
      gainSub.connect(lpfSub);
      lpfSub.connect(merger, 0, 0);
      lpfSub.connect(merger, 0, 1);

      oscL.start(now);
      oscR.start(now);
      oscSub.start(now);

      droneNodes = { oscs: [oscL, oscR, oscSub], master };
    }

    function stopDrone() {
      if (!droneNodes) return;
      const c = getCtx();
      const { oscs, master } = droneNodes;
      master.gain.linearRampToValueAtTime(0, c.currentTime + 2.0);
      setTimeout(() => {
        oscs.forEach(o => { try { o.stop(); } catch(e) {} });
      }, 2200);
      droneNodes = null;
    }

    // ─── Phase chime — deep warm bowl, soft but present ───────────────
    function playChime() {
      if (!chimesOn) return;
      const c   = getCtx();
      const now = c.currentTime;

      // 174Hz — deep, warm, grounding. Lowest solfeggio tone.
      // Sits below the binaural carrier so it doesn’t clash or feel sharp
      const note = 174;

      const reverb = makeReverb(c, 4.0, 2.8);
      const lpf    = c.createBiquadFilter();
      lpf.type = 'lowpass';
      lpf.frequency.value = 520; // cut everything sharp above this
      lpf.Q.value = 0.3;
      const out = c.createGain();
      out.gain.value = 0.9; // strong enough to hear, not jarring

      lpf.connect(reverb);
      reverb.connect(out);
      out.connect(c.destination);

      // Root — deep and warm
      const osc1  = c.createOscillator();
      const gain1 = c.createGain();
      osc1.type = 'sine';
      osc1.frequency.value = note;
      gain1.gain.setValueAtTime(0, now);
      gain1.gain.linearRampToValueAtTime(0.10, now + 0.18); // slow gentle attack
      gain1.gain.exponentialRampToValueAtTime(0.0001, now + 3.5);
      osc1.connect(gain1);
      gain1.connect(lpf);
      osc1.start(now);
      osc1.stop(now + 4.0);

      // Soft octave — adds body without brightness
      const osc2  = c.createOscillator();
      const gain2 = c.createGain();
      osc2.type = 'sine';
      osc2.frequency.value = note * 2;
      gain2.gain.setValueAtTime(0, now);
      gain2.gain.linearRampToValueAtTime(0.035, now + 0.18);
      gain2.gain.exponentialRampToValueAtTime(0.0001, now + 2.8);
      osc2.connect(gain2);
      gain2.connect(lpf);
      osc2.start(now);
      osc2.stop(now + 3.0);
    }

    // ─── Breathing loop ───────────────────────────────────────────────────
    function runPhase() {
      if (!running) return;
      const p = PHASES[phaseIdx];
      circle.className = 'breath-circle ' + p.scale;
      phaseEl.textContent = p.name;
      playChime();

      timer = setTimeout(() => {
        phaseIdx = (phaseIdx + 1) % PHASES.length;
        runPhase();
      }, p.duration * 1000);
    }

    function start() {
      running  = true;
      phaseIdx = 0;
      startBtn.textContent = 'Pause';
      startBtn.classList.add('stop');
      startDrone(currentMode);
      runPhase();
    }

    function stop() {
      running = false;
      clearTimeout(timer);
      circle.className     = 'breath-circle';
      phaseEl.textContent  = 'Begin';
      startBtn.textContent = 'Begin';
      startBtn.classList.remove('stop');
      stopDrone();
    }

    startBtn.addEventListener('click', () => running ? stop() : start());

    soundBtn.addEventListener('click', () => {
      soundOn = !soundOn;
      soundBtn.classList.toggle('active', soundOn);
      if (running) {
        if (soundOn) startDrone(currentMode);
        else stopDrone();
      }
    });

    chimeBtn.addEventListener('click', () => {
      chimesOn = !chimesOn;
      chimeBtn.classList.toggle('active', chimesOn);
    });

    modeRow.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        modeRow.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = btn.dataset.mode;
        sublabelEl.textContent = MODES[currentMode].sublabel;
        if (running) startDrone(currentMode);
      });
    });

    // Set initial sublabel
    sublabelEl.textContent = MODES[currentMode].sublabel;
  </script>

</body>
</html>
